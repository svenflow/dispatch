# config.example.yaml — Copy to config.local.yaml and fill in your values.
# config.local.yaml is gitignored. This file is checked in as a template.

owner:
  name: "Your Name"
  phone: "+1XXXXXXXXXX"
  email: "you@example.com"

partner:
  name: "Partner Name"  # Remove section if not applicable

assistant:
  name: "Dispatch"  # Used by dispatch-api for session prefix ({name}-app) and display name
  email: "assistant@example.com"

signal:
  account: "+1XXXXXXXXXX"

hue:
  bridges:
    home:
      ip: "10.10.10.X"
    office:
      ip: "10.10.10.X"

lutron:
  bridge_ip: "10.10.10.X"

tailscale:
  hostname: "your-device.tail123456.ts.net"
  ip: "100.x.x.x"

network:
  local_ip: "10.10.10.x"

plex:
  tailscale_url: "http://your-device.tail123456.ts.net:8443/web"
  tailscale_ip_url: "http://100.x.x.x:8443/web"
  local_url: "http://10.10.10.x:32400/web"
  cloud_url: "https://app.plex.tv/desktop"

podcast:
  bucket: "your-podcast-bucket"
  title: "Your Audio Articles"
  email: "you@example.com"

hooks:
  compact_notify: true  # Send SMS for both pre-compact ("Compacting…") and post-compact ("Done compacting ✓")

chrome:
  profiles:
    0:
      name: "assistant"
      email: "assistant@example.com"
    1:
      name: "owner"
      email: "you@example.com"

bloomin8:
  ip: "10.10.10.X"
  keepalive_enabled: true
  keepalive_interval: 60
  wake_proxy_ip: "10.10.10.X"  # ESP32 BLE wake proxy

sonos:
  speakers:
    "Living Room": "10.10.10.X"
    "Kitchen": "10.10.10.X"
  all_devices:
    "Speaker: Living Room": "10.10.10.X"
    "Sub: Living Room": "10.10.10.X"

ruview:
  repo_path: "~/code/RuView"
  esp32:
    serial_port: "/dev/cu.usbserial-XXXXXX"
    mac: "XX:XX:XX:XX:XX:XX"
    chip: "esp32s3"
    flash_size: "8MB"
    node_id: 1
  wifi:
    ssid: "YourSSID"
    # password: stored in macOS Keychain as "ruview-wifi"
  server:
    http_port: 3000
    ws_port: 8766
    udp_port: 5005
    bind_addr: "0.0.0.0"
