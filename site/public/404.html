<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dispatch</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Redirects 404s to index.html with the path as a query param
      const path = window.location.pathname;
      const search = window.location.search;
      window.location.replace('/dispatch/' + '?p=' + encodeURIComponent(path.replace('/dispatch/', '')) + search);
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
